<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expert Skin Consultation | Premium Aesthetics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .chat-container { height: 100vh; max-width: 500px; margin: 0 auto; background: white; display: flex; flex-direction: column; box-shadow: 0 4px 30px rgba(0,0,0,0.05); }
        .messages-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 14.5px; line-height: 1.5; position: relative; animation: fadeIn 0.3s ease; }
        .msg-bot { background: #f0f0f0; color: #1a1a1a; align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg-user { background: #1a1a1a; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .options-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; justify-content: flex-end; }
        .option-btn { background: white; border: 1.5px solid #1a1a1a; color: #1a1a1a; padding: 8px 16px; border-radius: 20px; font-size: 13.5px; cursor: pointer; transition: 0.2s; font-weight: 500; }
        .option-btn:hover { background: #1a1a1a; color: white; }
        .typing { font-style: italic; font-size: 12px; color: #888; margin-bottom: 10px; display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input { border: 1.5px solid #e0e0e0; border-radius: 12px; padding: 12px; outline: none; width: 100%; margin-top: 10px; font-size: 14px; }
        input:focus { border-color: #1a1a1a; }
        .cta-btn { background: #25D366; color: white; padding: 16px; border-radius: 12px; text-align: center; font-weight: 600; display: block; margin-top: 20px; text-decoration: none; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #e0e0e0; border-radius: 10px; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="p-4 border-b flex items-center gap-3 bg-white sticky top-0 z-10">
        <div class="w-10 h-10 bg-black rounded-full flex items-center justify-center text-white font-bold text-xs">SA</div>
        <div>
            <h1 class="text-sm font-semibold">Senior Skin Consultant</h1>
            <p class="text-[10px] text-green-500 font-medium">● Online</p>
        </div>
    </div>

    <div class="messages-area" id="chat-box">
        <div id="typing-indicator" class="typing">Consultant is typing...</div>
    </div>

    <div id="input-container" class="p-4 border-t bg-gray-50 hidden">
        <div id="form-fields"></div>
        <button id="submit-lead" class="w-full bg-black text-white p-3 rounded-xl mt-3 font-medium text-sm">Review My Results</button>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chat-box');
    const typingIndicator = document.getElementById('typing-indicator');
    const inputContainer = document.getElementById('input-container');
    const formFields = document.getElementById('form-fields');
    const submitBtn = document.getElementById('submit-lead');

    let userData = {
        skinType: '',
        concern: '',
        severity: '',
        urgency: '',
        experience: '',
        name: '',
        phone: ''
    };

    const questions = [
        {
            id: 'skinType',
            text: "Welcome. I’ll provide a professional assessment in under 60 seconds. To start, what is your skin type?",
            options: ['Oily/Acne-Prone', 'Dry/Flaky', 'Combination', 'Sensitive']
        },
        {
            id: 'concern',
            text: "Which of these is your primary concern currently?",
            options: ['Active acne / breakouts', 'Acne marks / pigmentation', 'Dull & uneven tone', 'Dehydrated / flaky skin']
        },
        {
            id: 'severity',
            text: "How serious is this concern?",
            options: ['Mild (just started)', 'Moderate (recurring)', 'Severe (persistent)']
        },
        {
            id: 'urgency',
            text: "When do you want to see results?",
            options: ['In 3–5 days (urgent)', 'In 2–3 weeks', 'Long-term improvement']
        },
        {
            id: 'experience',
            text: "Have you tried any professional treatments before?",
            options: ['First time', 'Tried facials before', 'Tried but didn’t see results']
        }
    ];

    let currentStep = 0;

    function showTyping() {
        typingIndicator.style.display = 'block';
        chatBox.appendChild(typingIndicator);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function hideTyping() {
        typingIndicator.style.display = 'none';
    }

    function addMessage(text, sender = 'bot') {
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg msg-${sender}`;
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function showOptions(options, key) {
        const container = document.createElement('div');
        container.className = 'options-container';
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => handleOptionClick(opt, key, container);
            container.appendChild(btn);
        });
        chatBox.appendChild(container);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function handleOptionClick(val, key, container) {
        userData[key] = val;
        container.remove();
        addMessage(val, 'user');
        currentStep++;
        setTimeout(askNext, 600);
    }

    function askNext() {
        if (currentStep < questions.length) {
            showTyping();
            setTimeout(() => {
                hideTyping();
                const q = questions[currentStep];
                addMessage(q.text);
                showOptions(q.options, q.id);
            }, 1000);
        } else {
            showLeadForm();
        }
    }

    function showLeadForm() {
        showTyping();
        setTimeout(() => {
            hideTyping();
            addMessage("I’ve analyzed your profile. Most people with your skin type choose the wrong treatment and don’t see results.");
            addMessage("Please share your details so I can send your specialized Skin Blueprint and priority voucher.");
            inputContainer.classList.remove('hidden');
            formFields.innerHTML = `
                <input type="text" id="user-name" placeholder="Full Name" required>
                <input type="tel" id="user-phone" placeholder="WhatsApp Number" required>
            `;
            chatBox.scrollTop = chatBox.scrollHeight;
        }, 1000);
    }

    submitBtn.onclick = () => {
        const name = document.getElementById('user-name').value;
        const phone = document.getElementById('user-phone').value;
        if (!name || !phone) return alert("Please provide your details to see the recommendation.");
        userData.name = name;
        userData.phone = phone;
        inputContainer.classList.add('hidden');
        showTyping();
        setTimeout(showFinalResult, 1500);
    };

    function showFinalResult() {
        hideTyping();
        let treatment = "";
        let reasoning = "";
        let expectation = "";
        let offerText = "";
        let ctaText = "Book via WhatsApp Now";

        // Advanced Logic Mapping
        if (userData.concern === 'Active acne / breakouts') {
            treatment = userData.severity === 'Severe (persistent)' ? "Advanced Medical Grade Acne Protocol" : "The Charcoal Laser Peel";
            reasoning = `Since you mentioned ${userData.skinType.toLowerCase()} skin and ${userData.concern.toLowerCase()}, generic facials won't help. We need to target the bacteria and regulate sebum production at the root.`;
            expectation = "You will notice a reduction in inflammation and flatter active lesions within your first session.";
        } else if (userData.concern === 'Acne marks / pigmentation') {
            treatment = "The Crystal Glow Micro-Peel";
            reasoning = `Pigmentation is stubborn. Based on your ${userData.severity.toLowerCase()} case, our protocol uses light-sensitive actives to break down melanin without damaging your ${userData.skinType.toLowerCase()} skin.`;
            expectation = "Significant lightening of marks and more uniform skin tone over 2-3 weeks.";
        } else if (userData.concern === 'Dull & uneven tone') {
            treatment = "The Red-Carpet Hydrafacial";
            reasoning = `Your ${userData.skinType.toLowerCase()} skin is likely holding onto dead cells. This treatment deeply exfoliates and infuses antioxidants for immediate radiance.`;
            expectation = "An instant glass-skin finish and refined pores immediately after the session.";
        } else {
            treatment = "High-Potency Hyaluronic Infusion";
            reasoning = `Dehydration in ${userData.skinType.toLowerCase()} skin requires a deep moisture-locking mechanism rather than just surface creams.`;
            expectation = "Restored bounce and plumpness, eliminating dry patches within 48 hours.";
        }

        // Urgency-based messaging
        if (userData.urgency === 'In 3–5 days (urgent)') {
            offerText = "Due to your urgent timeline, we have reserved a priority slot for you. Use code FLASHGLOW for a complimentary rapid-recovery mask.";
            ctaText = "Claim Priority Slot on WhatsApp";
        } else {
            offerText = "To support your long-term skin improvement journey, we are offering 20% OFF your first 3 sessions with code JOURNEY20.";
            ctaText = "Start My Skin Journey";
        }

        addMessage(`Analysis complete, ${userData.name}. Based on your profile, we recommend: ${treatment}.`);
        
        setTimeout(() => {
            addMessage(reasoning);
            setTimeout(() => {
                addMessage(`Expected result: ${expectation}`);
                
                const voucherMsg = document.createElement('div');
                voucherMsg.className = 'msg msg-bot bg-yellow-50 border border-yellow-200 mt-2';
                voucherMsg.innerHTML = `<strong>🎁 Professional Offer:</strong><br>${offerText}`;
                chatBox.appendChild(voucherMsg);

                const cta = document.createElement('a');
                cta.className = 'cta-btn';
                const whatsappText = encodeURIComponent(`Hi! I'm ${userData.name}. My Skin Blueprint recommended the ${treatment} for my ${userData.concern}. I want to book my session!`);
                cta.href = `https://wa.me/910000000000?text=${whatsappText}`;
                cta.innerText = ctaText;
                chatBox.appendChild(cta);
                
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 800);
        }, 800);
    }

    setTimeout(askNext, 500);
</script>

</body>
</html>
